# SWC_apply_airbag_control_command — AirbagControlCommand → local restraint actuator
# Source: airbag_control_unit.yaml — handler "on_airbag_control_command"
# Pattern: DirectSignalMapping — pure CAN→CAN routing.

handlers:
  - name: on_airbag_control_command
    pattern: DirectSignalMapping
    input:
      namespace: AIRBAG-CpdCan0
      frame_filter: AirbagControlCommand
      signal: AirbagControlCommand.AirbagControlCommand
    output:
      - namespace: AIRBAG-CpdCan0
        signals:
          - AirbagActuatorState.AirbagActuated