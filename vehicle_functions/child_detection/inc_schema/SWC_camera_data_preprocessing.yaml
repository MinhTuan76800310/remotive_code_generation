# camera_data_preprocessing bridges an external camera websocket onto the
# CAN restbus. Two JSON fields are forwarded independently:
#   - ws_key "ChildDetected" → CameraInput.ChildDetectedByCamera (bool)
#   - ws_key "IsMoving"      → CameraInput.IsMoving (bool)
# Both are independently toggleable by the camera_service UI/CLI.
# Message contract (each ws frame is JSON text; unknown keys ignored):
#   {"ChildDetected": 0|1, "IsMoving": 0|1, ...}
websocket_listeners:
  - name: camera_data_preprocessing
    url: ws://localhost:1122
    output_namespace: DMS-CpdCan0
    signal_map:
      - ws_key: ChildDetected
        signal: CameraInput.ChildDetectedByCamera
      - ws_key: IsMoving
        signal: CameraInput.IsMoving
    reconnect_delay_sec: 2.0
handlers: []