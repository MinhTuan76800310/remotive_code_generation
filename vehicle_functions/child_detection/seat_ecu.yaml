# SeatECU — Seat Sensor Detection (weight-threshold logic)
# Source diagram: CAD_ECU_architecture.drawio — page 2 "ECU CAN I/O", node "seat-box"
#   Function: "Read seat sensor float value, if value >= 8kg return false else true
#              → publish SeatOccupied"
#
# Semantics (confirmed with author):
#   The float is a weight in kilograms. A child is light, so:
#     SeatOccupied = False if weight_kg >= 8 else True
#   TRUE  when weight <  8kg  → child-sized occupant present
#   FALSE when weight >= 8kg  → adult / above child threshold
#
# Recipe: ThresholdMapping (generalized — operator + true_when)
#   The built-in ThresholdMapping recipe now supports two optional fields:
#     operator  : the comparison token (default '>'); here '>=' to match the
#                 author's rule "value >= 8kg".
#     true_when : which side of the comparison is TRUE (default 'above'); here
#                 'below' because the rule is INVERTED — SeatOccupied is TRUE
#                 when the weight is BELOW the threshold (light = child).
#   With operator '>=' and true_when 'below' the compiler emits:
#       1 if not (seat_weight_sensor_signal >= 8) else 0
#   which is exactly "False if weight_kg >= 8 else True" expressed as 0/1.
#   This replaces the earlier novel_logic stub — the behavior is now generated
#   deterministically by the recipe, no hand-filled stub needed.
#
#   ⚠️ YAML quoting: operator MUST be quoted (operator: ">="). An UNquoted
#   `operator: >=` is invalid YAML — `>` is the folded-block-scalar indicator,
#   so it raises yaml.YAMLError at parse time, before ThresholdMapping can
#   report a friendly error. Omitting operator entirely is also valid (→ '>').
#
# CAN out: SeatOccupied → arrow a_seat → CentralHPC
#   (consumed by CentralHPC's Child Detection Logic: AND with ChildDetectedByCamera)

model:
  name: SeatECU
  ecu_name: SEAT
# change:
#       role --> I/O

namespaces:
  # All CAN on the shared CpdCan0 channel.
  # role: both — SEAT both receives SeatWeightSensor (local sensor) and
  # transmits SeatInput (SeatOccupied) on the same physical bus.
  - name: SEAT-CpdCan0
    type: can
    role: both
    restbus:
      sender_filter: SEAT
  - name: SEAT-CpdCan1
    type: can
    role: input
    restbus:
      sender_filter: SEAT
      
handlers:
  # Local seat weight (kg) → threshold rule → publish SeatOccupied (CAN signal a_seat).
  # Rule (author): seat_occupied = False if weight_kg >= 8 else True
  #   → TRUE when weight is BELOW 8kg (child-sized), so operator '>=' + true_when 'below'.
  - name: on_seat_occupancy
    pattern: ThresholdMapping
    threshold: 8
    operator: ">="
    true_when: below
    input:
      namespace: SEAT-CpdCan0
      frame_filter: SeatWeightSensor
      signal: SeatWeightSensor.WeightKg
    output:
      namespace: SEAT-CpdCan0
      signals:
        - SeatInput.SeatOccupied
