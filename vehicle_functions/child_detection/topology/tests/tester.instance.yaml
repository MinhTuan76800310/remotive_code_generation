schema: remotive-topology-instance:0.17

containers:
  tester:
    profiles: [tester]
    build:
      target: tester
      dockerfile: ../Dockerfile
    volumes:
      - .:/app
    working_dir: /app
    command: "pytest --broker_url=http://topology-broker.com:50051 -s -vv"
    depends_on:
      - seatecu
      - drivermonitoringecu
      - centralhpc
      - cockpithmiecu
      - airbagcontrolunit