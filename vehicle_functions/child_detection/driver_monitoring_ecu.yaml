#   Function: "Read camera child detection, at websocket local:1122
#              → publish ChildDetectedByCamera"

model:
  name: DriverMonitoringECU
  ecu_name: DMS

namespaces:
  - name: DMS-CpdCan0
    type: can
    role: output
    restbus:
      sender_filter: DMS

# Model-level websocket listeners (external transport → Remotive CAN restbus).
# Each listener runs a background asyncio task for the ECU's whole lifetime.
websocket_listeners:
  - name: camera_child_detection
    url: ws://localhost:1122
    output_namespace: DMS-CpdCan0
    signal_map:
      - ws_key: ChildDetected
        signal: CameraInput.ChildDetectedByCamera
    cleanup: true              # required True — task cancelled on exit/reboot
    reconnect_delay_sec: 2.0   # backoff between reconnects (default 2.0)

handlers: []
