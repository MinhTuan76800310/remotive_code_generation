worker_processes auto;
events { worker_connections 1024; }
worker_shutdown_timeout 1s;

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Upstreams use Docker DNS / hostname inside the network
  upstream grpc_up {
    server topology-broker.com:50051;
  }

  upstream broker_up {
    server topology-broker.com:8081;
  }

  server {
    listen 8080;
    http2 on;
    server_name _;
    access_log off;

    # ---------- /api/broker/* -> HTTP service ----------
    # No trailing slash → keep /api/broker prefix (1:1 mapping)
    location ^~ /api/broker {
      proxy_pass http://broker_up;       # keep path unchanged
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_request_buffering off;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # ---------- everything else -> gRPC service ----------
    location / {
      grpc_pass grpc://grpc_up;
      grpc_set_header Host              $host;
      grpc_set_header X-Real-IP         $remote_addr;
      grpc_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      grpc_set_header X-Forwarded-Proto $scheme;
      grpc_read_timeout   3600s;
      grpc_send_timeout   3600s;
    }
  }
}
