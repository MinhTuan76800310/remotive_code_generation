# LightControlECU — ambient light 1:1 mirror (schema_v2 / bmgen_ECA)
# Boot: TX AmbientLight = 0. On AmbientReq != ambient → latch + TX (skip if same).
apiVersion: v1.0
ecu_mock:
  name: LightControlECU
behavior:
  interfaces:
    can_rx:
      - signal: "[LightControlECU-BodyCan0]PW_AmbientLightCmd.AmbientReq"
    can_tx:
      - signal: "[LightControlECU-BodyCan0]PW_AmbientLight.AmbientLight"
    someip_tx: []
  state:
    - name: ambient
      type: int
      init: 0
    - name: boot_done
      type: bool
      init: false
  timers:
    # Free-running boot tick — only boot_publish consumes it (one-shot via boot_done)
    - name: boot_tick
      interval: 0.1
      auto_start: true
  rules:
    - rule_id: boot_publish
      trigger:
        type: on_timer
        target: boot_tick
      condition: "$state.boot_done == false"
      actions:
        - type: tx
          target: "[LightControlECU-BodyCan0]PW_AmbientLight.AmbientLight"
          payload: "$state.ambient"
        - type: set_state
          target: boot_done
          payload: "true"

    # 1:1 mirror — skip when req equals current ambient
    - rule_id: apply_ambient_req
      trigger:
        type: on_rx
        target: "[LightControlECU-BodyCan0]PW_AmbientLightCmd.AmbientReq"
      condition: "$[LightControlECU-BodyCan0]PW_AmbientLightCmd.AmbientReq != $state.ambient"
      actions:
        - type: set_state
          target: ambient
          payload: "$[LightControlECU-BodyCan0]PW_AmbientLightCmd.AmbientReq"
        - type: tx
          target: "[LightControlECU-BodyCan0]PW_AmbientLight.AmbientLight"
          payload: "$state.ambient"
