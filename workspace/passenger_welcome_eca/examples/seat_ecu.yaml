# SeatECU — seat position actuator + IsDone (schema_v2 / bmgen_ECA)
# RX SeatPosTarget → latch target → 2s startup (20×0.1s) → step ±1 → TX SeatPosition
# → on arrive: is_done=true, TX IsDone=true. Retarget restarts startup and clears done.
apiVersion: v1.0
ecu_mock:
  name: SeatECU
behavior:
  interfaces:
    can_rx:
      - signal: "[SeatECU-BodyCan0]PW_SeatCmd.SeatPosTarget"
    can_tx:
      - signal: "[SeatECU-BodyCan0]PW_SeatStatus.SeatPosition"
      - signal: "[SeatECU-BodyCan0]PW_SeatStatus.IsDone"
    someip_tx: []
  parameters:
    - name: move_step
      type: int
      value: 1             # position units per tick after startup
    - name: startup_ticks
      type: int
      value: 20            # 20 × 0.1s = 2s actuator startup delay
  state:
    - name: seat_pos
      type: int
      init: 0
    - name: seat_target
      type: int
      init: 0
    - name: seat_moving
      type: bool
      init: false
    - name: startup_ticks_left
      type: int
      init: 0
    - name: is_done
      type: bool
      init: false
  timers:
    - name: move_tick
      interval: 0.1
      auto_start: true
  rules:
    # Accept new target when different from current pos AND from in-flight target.
    # Retarget while moving also matches → restarts countdown, clears done.
    - rule_id: accept_seat_target
      trigger:
        type: on_rx
        target: "[SeatECU-BodyCan0]PW_SeatCmd.SeatPosTarget"
      condition: "$[SeatECU-BodyCan0]PW_SeatCmd.SeatPosTarget != $state.seat_pos and $[SeatECU-BodyCan0]PW_SeatCmd.SeatPosTarget != $state.seat_target"
      actions:
        - type: set_state
          target: seat_target
          payload: "$[SeatECU-BodyCan0]PW_SeatCmd.SeatPosTarget"
        - type: set_state
          target: seat_moving
          payload: "true"
        - type: set_state
          target: is_done
          payload: "false"
        - type: tx
          target: "[SeatECU-BodyCan0]PW_SeatStatus.IsDone"
          payload: "false"
        - type: set_state
          target: startup_ticks_left
          payload: "$para.startup_ticks"

    # Startup phase: count down 20 ticks (~2s) before actuator steps
    - rule_id: startup_countdown
      trigger:
        type: on_timer
        target: move_tick
      condition: "$state.seat_moving == true and $state.startup_ticks_left > 0"
      actions:
        - type: set_state
          target: startup_ticks_left
          payload: "$state.startup_ticks_left - 1"

    # After startup: step ±move_step toward target, then publish position
    - rule_id: step_seat_pos
      trigger:
        type: on_timer
        target: move_tick
      condition: "$state.seat_moving == true and $state.startup_ticks_left == 0 and $state.seat_pos != $state.seat_target"
      actions:
        - type: set_state
          target: seat_pos
          payload: "$state.seat_pos + max(0 - $para.move_step, min($para.move_step, $state.seat_target - $state.seat_pos))"
        - type: tx
          target: "[SeatECU-BodyCan0]PW_SeatStatus.SeatPosition"
          payload: "$state.seat_pos"

    # Arrived: clear moving, raise is_done, TX IsDone=true
    - rule_id: complete_seat_move
      trigger:
        type: on_timer
        target: move_tick
      condition: "$state.seat_moving == true and $state.startup_ticks_left == 0 and $state.seat_pos == $state.seat_target"
      actions:
        - type: set_state
          target: seat_moving
          payload: "false"
        - type: set_state
          target: is_done
          payload: "true"
        - type: tx
          target: "[SeatECU-BodyCan0]PW_SeatStatus.IsDone"
          payload: "true"
