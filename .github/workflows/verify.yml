name: Verify Generated Behavioral Models

on:
  push:
    paths:
      - 'remotive-bm-compiler/examples/*.yaml'
      - 'remotive-bm-compiler/bmgen/**'
      - 'remotive-bm-compiler/tests/**'
      - 'remotive-bm-compiler/pyproject.toml'
      - '.github/workflows/verify.yml'
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: remotive-bm-compiler
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bmgen
        run: pip install -e ".[dev]"

      - name: Debug — check registry and logic_gate module
        run: |
          python3 -c "
          from bmgen.recipes.registry import create_default_registry
          reg = create_default_registry()
          print('Known patterns:', sorted(reg.known_patterns()))
          "
          python3 -c "
          from bmgen.recipes.logic_gate import LogicGateRecipe
          print('LogicGateRecipe imported OK')
          r = LogicGateRecipe('and')
          print('LogicAnd recipe name:', r.name)
          "

      - name: Parse all example YAML specs
        run: |
          for yaml in examples/*.yaml; do
            echo "Parsing $yaml..."
            bmgen parse "$yaml" || exit 1
          done

      - name: Generate all example models
        run: |
          mkdir -p _generated
          for yaml in examples/*.yaml; do
            echo "Generating from $yaml..."
            bmgen generate "$yaml" --out _generated/ || exit 1
          done

      - name: Verify all generated models
        run: |
          for yaml in examples/*.yaml; do
            echo "Verifying from $yaml..."
            bmgen verify _generated/ --spec "$yaml" || exit 1
          done

      - name: Run test suite
        run: pytest tests/ -v
